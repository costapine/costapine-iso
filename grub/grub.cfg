# Costapine Linux - GRUB Configuration
# Used for UEFI boot from ISO

set default=0
set timeout=5
set gfxmode=auto
set gfxpayload=keep

insmod all_video
insmod gfxterm
insmod png

terminal_output gfxterm

menuentry "Costapine Linux (Live)" --class costapine --class linux {
    linux /boot/vmlinuz-lts boot=live quiet loglevel=3 modules=loop,squashfs,overlay
    initrd /boot/initramfs-costapine
}

menuentry "Costapine Linux (Live - Safe Mode)" --class costapine --class linux {
    linux /boot/vmlinuz-lts boot=live nomodeset single
    initrd /boot/initramfs-costapine
}

menuentry "Costapine Linux (Live - Copy to RAM)" --class costapine --class linux {
    linux /boot/vmlinuz-lts boot=live toram quiet loglevel=3
    initrd /boot/initramfs-costapine
}

menuentry "System restart" {
    echo "System rebooting..."
    reboot
}

menuentry "System shutdown" {
    echo "System shutting down..."
    halt
}
