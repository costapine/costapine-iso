# Costapine Linux - Syslinux/Isolinux Configuration
# Used for legacy BIOS boot from ISO

UI vesamenu.c32
MENU TITLE Costapine Linux
MENU BACKGROUND splash.png

MENU COLOR border       30;44    #40ffffff #a0000000 std
MENU COLOR title        1;36;44  #ff00bcd4 #00000000 std
MENU COLOR sel          7;37;40  #e0ffffff #20ffffff all
MENU COLOR unsel        37;44    #90ffffff #a0000000 std
MENU COLOR help         37;40    #c0ffffff #a0000000 std
MENU COLOR timeout_msg  37;40    #80ffffff #00000000 std
MENU COLOR timeout      1;37;40  #c0ffffff #00000000 std
MENU COLOR msg07        37;40    #90ffffff #a0000000 std
MENU COLOR tabmsg       31;40    #30ffffff #00000000 std

PROMPT 0
TIMEOUT 50

LABEL live
  MENU LABEL Costapine Linux (Live)
  MENU DEFAULT
  KERNEL /boot/vmlinuz-lts
  APPEND initrd=/boot/initramfs-costapine boot=live quiet loglevel=3 modules=loop,squashfs,overlay

LABEL safe
  MENU LABEL Costapine Linux (Live - Safe Mode)
  KERNEL /boot/vmlinuz-lts
  APPEND initrd=/boot/initramfs-costapine boot=live nomodeset single

LABEL toram
  MENU LABEL Costapine Linux (Live - Copy to RAM)
  KERNEL /boot/vmlinuz-lts
  APPEND initrd=/boot/initramfs-costapine boot=live toram quiet loglevel=3

LABEL reboot
  MENU LABEL Reboot
  COM32 reboot.c32

LABEL poweroff
  MENU LABEL Power Off
  COM32 poweroff.c32
